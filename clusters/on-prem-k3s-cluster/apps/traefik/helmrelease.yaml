apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  targetNamespace: traefik
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
      version: ">=30.0.0"
  values:
    deployment:
      kind: Deployment
      replicas: 3
      
    # Set default IngressClass to traefik
    ingressClass:
      enabled: true
      isDefaultClass: true
      
    # Metallb will provide a LoadBalancer IP for Traefik
    service:
      enabled: true
      type: LoadBalancer