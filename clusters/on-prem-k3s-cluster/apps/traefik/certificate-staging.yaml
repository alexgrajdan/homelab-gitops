apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-alexdevops-staging
  namespace: traefik
spec:
  secretName: wildcard-alexdevops-staging-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - "local.alexdevops.com"
    - "*.local.alexdevops.com"